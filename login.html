<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aziba's London Lounge</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="text-align:center; margin-right: -200px;">
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-utensils"></i> Aziba's London Lounge</h1>
            <p id="form-title">Please login to continue</p>
        </div>
        
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
        
        <!-- Login Form -->
        <form class="login-form" id="loginForm">
            <div class="user-type">
                <div class="user-option active" data-type="customer">
                    <i class="fas fa-user"></i>
                    <div>Customer</div>
                </div>
                <div class="user-option" data-type="admin">
                    <i class="fas fa-user-shield"></i>
                    <div>Admin</div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <div class="login-links">
                <p>Don't have an account? <a href="#" id="showRegisterLink">Register here</a></p>
                <p style="margin-top: 10px; font-size: 14px;">
                    <strong>Demo Credentials:</strong><br>
                    Customer: customer@example.com / customer123<br>
                    Admin: admin@azibaslounge.com / admin123
                </p>
            </div>
        </form>

        <!-- Registration Form (Hidden by default) -->
        <form class="registration-form" id="registrationForm" style="display: none;">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <div class="input-with-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>
            </div>

            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" required placeholder="Enter your email">
                </div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="input-with-icon">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" required placeholder="Enter your phone number">
                </div>
            </div>

            <div class="form-group">
                <label for="address">Delivery Address</label>
                <div class="input-with-icon">
                    <i class="fas fa-map-marker-alt"></i>
                    <textarea id="address" rows="2" required placeholder="Enter your delivery address"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label for="regPassword">Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" required placeholder="Create a password">
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                </div>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="#" id="termsLink">Terms & Conditions</a> and <a href="#" id="privacyLink">Privacy Policy</a></label>
            </div>

            <button type="submit" class="register-btn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>

            <div class="login-links">
                <p>Already have an account? <a href="#" id="showLoginLink">Login here</a></p>
            </div>
        </form>
    </div>

    <script>
        // Initialize localStorage for users if not exists
        if (!localStorage.getItem('registeredUsers')) {
            localStorage.setItem('registeredUsers', JSON.stringify([
                {
                    id: 1,
                    fullName: "Demo Customer",
                    email: "customer@example.com",
                    phone: "+2348012345678",
                    address: "123 Sample Street, Lagos",
                    password: "customer123",
                    type: "customer",
                    registeredAt: new Date().toISOString()
                },
                {
                    id: 2,
                    fullName: "Admin User",
                    email: "admin@azibaslounge.com",
                    phone: "+2348098765432",
                    address: "Admin Office, Aziba's London Lounge",
                    password: "admin123",
                    type: "admin",
                    registeredAt: new Date().toISOString()
                }
            ]));
        }

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registrationForm = document.getElementById('registrationForm');
        const showRegisterLink = document.getElementById('showRegisterLink');
        const showLoginLink = document.getElementById('showLoginLink');
        const formTitle = document.getElementById('form-title');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        
        // User type selection
        const userOptions = document.querySelectorAll('.user-option');
        let selectedType = 'customer';

        userOptions.forEach(option => {
            option.addEventListener('click', () => {
                userOptions.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                selectedType = option.dataset.type;
                
                // Auto-fill demo credentials
                const emailField = document.getElementById('email');
                const passwordField = document.getElementById('password');
                
                if (selectedType === 'customer') {
                    emailField.value = 'customer@example.com';
                    passwordField.value = 'customer123';
                } else {
                    emailField.value = 'admin@azibaslounge.com';
                    passwordField.value = 'admin123';
                }
            });
        });

        // Show registration form
        showRegisterLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            registrationForm.style.display = 'block';
            formTitle.textContent = 'Create New Account';
            clearMessages();
        });

        // Show login form
        showLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            registrationForm.style.display = 'none';
            loginForm.style.display = 'block';
            formTitle.textContent = 'Please login to continue';
            clearMessages();
        });

        // Terms and Privacy links
        document.getElementById('termsLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Terms & Conditions:\n\n1. All food orders are subject to availability\n2. Delivery times are estimates only\n3. Prices may change without notice\n4. Refunds processed within 5-7 business days\n5. Contact support for any issues');
        });

        document.getElementById('privacyLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Privacy Policy:\n\nWe respect your privacy. Your personal information will only be used for:\n1. Processing your orders\n2. Delivery coordination\n3. Customer service\n4. Promotional offers (opt-in)\n\nWe never share your data with third parties without consent.');
        });

        // Auto-fill demo credentials on page load
        document.addEventListener('DOMContentLoaded', () => {
            const emailField = document.getElementById('email');
            const passwordField = document.getElementById('password');
            
            emailField.value = 'customer@example.com';
            passwordField.value = 'customer123';
            
            // Auto-focus on first field
            emailField.focus();
        });

        // Clear messages function
        function clearMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        // Show success message
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        // Validate email format
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Validate phone number
        function isValidPhone(phone) {
            const phoneRegex = /^[\+]?[0-9\s\-\(\)]+$/;
            return phoneRegex.test(phone) && phone.length >= 10;
        }

        // Validate password strength
        function isValidPassword(password) {
            return password.length >= 6;
        }

        // Check if email already exists
        function emailExists(email) {
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            return users.some(user => user.email.toLowerCase() === email.toLowerCase());
        }

        // Generate unique ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // Login form submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Simple validation
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }

            // Get registered users
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            
            // Find user
            const user = users.find(u => 
                u.email.toLowerCase() === email.toLowerCase() && 
                u.password === password
            );

            if (user) {
                // Store login state
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('userType', user.type);
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('userName', user.fullName);
                localStorage.setItem('userId', user.id);
                
                showSuccess('Login successful! Redirecting...');
                
                // Redirect after delay
                setTimeout(() => {
                    if (user.type === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1500);
            } else {
                showError('Invalid email or password. Please try again.');
            }
        });

        // Registration form submission
        registrationForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsAccepted = document.getElementById('terms').checked;

            // Validation
            if (!fullName || !email || !phone || !address || !password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }

            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }

            if (emailExists(email)) {
                showError('This email is already registered. Please use a different email or login.');
                return;
            }

            if (!isValidPhone(phone)) {
                showError('Please enter a valid phone number');
                return;
            }

            if (!isValidPassword(password)) {
                showError('Password must be at least 6 characters long');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (!termsAccepted) {
                showError('Please accept the Terms & Conditions and Privacy Policy');
                return;
            }

            // Get existing users
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            
            // Create new user object
            const newUser = {
                id: generateId(),
                fullName: fullName,
                email: email,
                phone: phone,
                address: address,
                password: password,
                type: 'customer', // Always customer for registration
                registeredAt: new Date().toISOString(),
                lastLogin: new Date().toISOString(),
                orders: [],
                loyaltyPoints: 0
            };

            // Add new user to storage
            users.push(newUser);
            localStorage.setItem('registeredUsers', JSON.stringify(users));

            // Auto-login after registration
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('userType', 'customer');
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userName', fullName);
            localStorage.setItem('userId', newUser.id);

            showSuccess('Account created successfully! Welcome to Aziba\'s London Lounge. Redirecting...');

            // Redirect to main page after delay
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });

        // Real-time validation
        document.getElementById('regEmail').addEventListener('blur', function() {
            const email = this.value.trim();
            if (email && isValidEmail(email)) {
                if (emailExists(email)) {
                    showError('This email is already registered. Please login instead.');
                }
            }
        });

        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('regPassword').value;
            const confirmPassword = this.value;
            
            if (confirmPassword && password !== confirmPassword) {
                this.style.borderColor = '#e74c3c';
            } else if (confirmPassword) {
                this.style.borderColor = '#2ecc71';
            }
        });

        // Show/hide password functionality
        const passwordFields = document.querySelectorAll('input[type="password"]');
        passwordFields.forEach(field => {
            const parent = field.parentElement;
            const toggleBtn = document.createElement('span');
            toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
            toggleBtn.className = 'password-toggle';
            toggleBtn.style.cssText = 'position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;';
            
            parent.style.position = 'relative';
            parent.appendChild(toggleBtn);
            
            toggleBtn.addEventListener('click', () => {
                const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
                field.setAttribute('type', type);
                toggleBtn.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
        });
    </script>
</body>
</html>
